<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notícias - LACID</title>
    <link rel="stylesheet" href="estilo.css">
    <link rel="icon" href="logoLACID.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="script.js" defer></script>
    <script src="news.js" defer></script>
</head>
<body>

    <header class="header-noticias">
        <div class="breadcrumb">
            <a href="index.html" aria-label="Página Inicial" class="icone-home">
                <i class="bi bi-house-door-fill"></i>
            </a>
        </div>
        <h1 class="titulo-pagina">NOTÍCIAS</h1>
    </header>

    <div class="layout-duas-colunas">

        <main class="coluna-lista" data-news-list></main>

        <aside class="coluna-filtros">
            
            <div class="busca-container">
                <input type="text" placeholder="Buscar notícia..." class="input-busca">
                <button type="button" class="btn-busca"><i class="bi bi-search"></i></button>
            </div>

            <div class="calendario-container">
                <h3 class="titulo-filtro">Filtrar por data</h3>
                
                <div class="calendario-box">
                    <p class="calendario-placeholder">table</p>
                    <table class="tabela-mes">
                        <thead>
                            <tr>
                                <th>Su</th><th>Mo</th><th>Tu</th><th>We</th><th>Th</th><th>Fr</th><th>Sa</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                                <td>15</td><td>16</td><td>17</td><td>18</td><td>19</td><td>20</td><td class="dia-ativo">21</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </aside>

    </div>
</body>
</html>
